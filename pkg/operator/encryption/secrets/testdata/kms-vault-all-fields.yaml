    name: "1"
  encryption.apiserver.operator.openshift.io-kms-provider-config:
    type: Vault
    vault:
      approleSecret:
        name: vault-approle
      kmsPluginImage: quay.io/openshift/kms-plugin@sha256:abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789
      tls:
        caBundle:
          name: vault-ca-bundle
        serverName: vault.example.com
      transitKey: my-key
      transitMount: transit
      vaultAddress: https://vault.example.com:8200
      vaultNamespace: my-namespace
finalizers:
- encryption.apiserver.operator.openshift.io/deletion-protection
labels:
