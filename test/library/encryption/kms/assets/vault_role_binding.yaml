apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-secret-creator
  namespace: {{ .Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-secret-creator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: {{ .Namespace }}
