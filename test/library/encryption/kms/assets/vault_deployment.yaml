apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: {{ .Namespace }}
spec:
  replicas: {{ .Replicas }}
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      serviceAccountName: vault
      containers:
        - name: vault
          image: {{ .Image }}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              export POD_IP=$(hostname -i)
              sed "s/POD_IP/${POD_IP}/g" /vault/config/vault.hcl > /tmp/vault.hcl
              exec vault server -config=/tmp/vault.hcl
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
            - name: VAULT_API_ADDR
              value: "http://$(POD_IP):8200"
            - name: VAULT_LICENSE_PATH
              value: "/vault/license/license"
          ports:
            - containerPort: 8200
              name: http
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /vault/data
            - name: config
              mountPath: /vault/config
            - name: license
              mountPath: /vault/license
        - name: vault-setup
          image: {{ .Image }}
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/vault/config/setup.sh"]
          env:
            - name: VAULT_ADDR
              value: "http://127.0.0.1:8200"
          volumeMounts:
            - name: config
              mountPath: /vault/config
      volumes:
        - name: config
          configMap:
            name: vault-config
        - name: license
          secret:
            secretName: vault-license
            optional: true
        - name: data
          emptyDir: {}
